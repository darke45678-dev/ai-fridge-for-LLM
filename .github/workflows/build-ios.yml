name: Build iOS IPA (Standalone)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 📥 擷取專案代碼 (Checkout)
        uses: actions/checkout@v4

      - name: 📦 安裝 Web 依賴項 (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🛠️ 前端建構 (Install & Build)
        env:
          npm_config_platform: darwin
          npm_config_arch: arm64
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm install
          npm run build

      - name: 🧬 注入 iOS 原生基因 (Capacitor Sync)
        run: |
          npx cap sync ios

      - name: 🏗️ 啟動 Xcode 雲端編譯 (Build App via SPM)
        run: |
          set -o pipefail
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee xcodebuild.log

      - name: 📦 打包成 .ipa 檔 (Windows 專用)
        run: |
          APP_PATH=$(find build/Build/Products -name "*.app" -type d | head -1)
          echo "Found .app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r KitchenLite.ipa Payload

      - name: 📁 上傳安裝資源 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: KitchenLite-iOS-Standalone-IPA
          path: KitchenLite.ipa
